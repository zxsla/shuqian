<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书签收藏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #5A00B8, #A020F0, #E040FF);
            background-size: 300% 300%;
            animation: flow 18s ease infinite;
            min-height: 100vh;
            color: white;
            padding: 20px 15px;
            position: relative;
        }

        @keyframes flow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }
        .title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 18px;
            text-shadow: 0 2px 20px rgba(255,255,255,0.6);
        }
        .avatar {
            width: 165px;
            height: 165px;
            border-radius: 50%;
            border: 6px solid rgba(255,255,255,0.85);
            box-shadow: 0 0 40px rgba(255, 100, 255, 0.9);
            overflow: hidden;
            margin: 0 auto 20px;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            max-width: 420px;
            margin: 0 auto 38px;
        }
        .btn {
            background: rgba(255,255,255,0.22);
            backdrop-filter: blur(18px);
            border: 1.5px solid rgba(255,255,255,0.45);
            border-radius: 20px;
            padding: 18px 12px;
            text-align: center;
            font-size: 17px;
            font-weight: 600;
            box-shadow: 0 6px 20px rgba(180,0,255,0.4);
        }
        .btn:active { transform: scale(0.95); background: rgba(255,255,255,0.35); }

        .cards {
            max-width: 420px;
            margin: 0 auto 90px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .card {
            background: rgba(255,255,255,0.18);
            backdrop-filter: blur(20px);
            border: 1.5px solid rgba(255,255,255,0.4);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(200, 50, 255, 0.5);
        }
        .card-header {
            padding: 22px 20px;
            font-size: 19px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-content {
            display: none;
            padding: 0 10px 18px;
        }
        .card-content.show { display: block; }
        .list-item {
            background: rgba(255,255,255,0.15);
            margin: 8px 12px;
            padding: 17px 20px;
            border-radius: 16px;
            font-size: 16.5px;
        }
        .list-item:active { background: rgba(255,255,255,0.32); }

        /* 音乐按钮 */
        .music-btn {
            position: fixed;
            bottom: 28px;
            right: 22px;
            width: 68px;
            height: 68px;
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(22px);
            border: 3px solid #FF80FF;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            box-shadow: 0 10px 35px rgba(255, 80, 255, 0.7);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">书签收藏</div>
        <div class="avatar">
            <img src="avatar.jpg" alt="红皮夹克白猫">
        </div>
    </div>

    <div class="buttons">
        <a href="https://t.me/Eternity0006" class="btn" target="_blank">TG频道</a>
        <div class="btn">待填</div>
        <div class="btn">待填</div>
        <div class="btn">待填</div>
    </div>

    <div class="cards">
        <!-- 公益项目 -->
        <div class="card">
            <div class="card-header" onclick="toggleCard(this)">公益项目 ▼</div>
            <div class="card-content">
                <div class="list-item">书签收藏夹</div>
                <div class="list-item">共享小火箭</div>
                <div class="list-item">节点订阅转换</div>
                <div class="list-item">Github加速</div>
                <div class="list-item">直链托管</div>
                <div class="list-item">音乐网站</div>
                <div class="list-item">Telegram代理</div>
                <div class="list-item">网盘搜索</div>
            </div>
        </div>

        <!-- 破解软件（已添加新内容） -->
        <div class="card">
            <div class="card-header" onclick="toggleCard(this)">破解软件 ▼</div>
            <div class="card-content">
                <div class="list-item">待添加项目</div>
                <a href="http://4275.com/r1q2zd" target="_blank" class="list-item" style="display:block; color:white; text-decoration:none;">应用商店</a>
                <a href="http://4275.com/znfkbc" target="_blank" class="list-item" style="display:block; color:white; text-decoration:none;">Shizuku</a>
                <a href="https://streamshare.wireway.ch/download/jgakord1" target="_blank" class="list-item" style="display:block; color:white; text-decoration:none;">酷我音乐</a>
            </div>
        </div>

        <!-- 预留卡片 -->
        <div class="card">
            <div class="card-header" onclick="toggleCard(this)">其他资源 ▼</div>
            <div class="card-content">
                <div class="list-item">待添加内容</div>
            </div>
        </div>
    </div>

    <!-- 音乐按钮（播放/暂停） -->
    <div onclick="toggleMusic()" id="musicBtn" class="music-btn">♫</div>

    <audio id="bgMusic" loop>
        <source src="https://streamshare.wireway.ch/download/4un2jvap" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');

        function toggleMusic() {
            if (audio.paused) {
                audio.play();
                musicBtn.style.background = 'rgba(255, 80, 255, 0.45)';
            } else {
                audio.pause();
                musicBtn.style.background = 'rgba(255,255,255,0.25)';
            }
        }

        function toggleCard(header) {
            const content = header.nextElementSibling;
            content.classList.toggle('show');
            header.textContent = content.classList.contains('show') 
                ? header.textContent.replace('▼', '▲') 
                : header.textContent.replace('▲', '▼');
        }
    </script>
</body>
</html>
