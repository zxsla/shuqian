<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书签收藏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #4B0082, #8A2BE2, #C026D3);
            min-height: 100vh;
            color: white;
            padding: 20px 15px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .title {
            font-size: 26px;
            font-weight: bold;
            text-shadow: 0 2px 15px rgba(255,255,255,0.4);
        }
        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 5px solid rgba(255,255,255,0.7);
            box-shadow: 0 0 30px rgba(192, 38, 211, 0.8);
            overflow: hidden;
            margin: 15px auto;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            max-width: 420px;
            margin: 0 auto 35px;
        }
        .btn {
            background: rgba(255,255,255,0.18);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 18px;
            padding: 18px;
            text-align: center;
            font-size: 17px;
            font-weight: 600;
            box-shadow: 0 6px 20px rgba(0,0,0,0.25);
        }
        .btn:active { transform: scale(0.96); }

        .cards {
            max-width: 420px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 22px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(192, 38, 211, 0.4);
        }
        .card-header {
            padding: 20px 18px;
            font-size: 19px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-content {
            display: none;
            padding: 0 8px 16px;
        }
        .card-content.show { display: block; }
        .list-item {
            background: rgba(255,255,255,0.1);
            margin: 6px 10px;
            padding: 16px 18px;
            border-radius: 14px;
            font-size: 16px;
        }
        .list-item:active {
            background: rgba(255,255,255,0.25);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">书签收藏</div>
        <div class="avatar">
            <img src="avatar.jpg" alt="红皮夹克白猫">
        </div>
    </div>

    <div class="buttons">
        <a href="https://t.me/Eternity0006" class="btn" target="_blank">TG频道 @Eternity0006</a>
        <div class="btn">待填</div>
        <div class="btn">待填</div>
        <div class="btn">待填</div>
    </div>

    <div class="cards">
        <!-- 公益项目卡片（可展开） -->
        <div class="card">
            <div class="card-header" onclick="toggleCard(this)">公益项目 ▼</div>
            <div class="card-content">
                <div class="list-item">书签收藏夹</div>
                <div class="list-item">共享小火箭</div>
                <div class="list-item">节点订阅转换</div>
                <div class="list-item">Github加速</div>
                <div class="list-item">直链托管</div>
                <div class="list-item">音乐网站</div>
                <div class="list-item">Telegram代理</div>
                <div class="list-item">网盘搜索</div>
            </div>
        </div>

        <!-- 破解软件卡片（可展开） -->
        <div class="card">
            <div class="card-header" onclick="toggleCard(this)">破解软件 ▼</div>
            <div class="card-content">
                <div class="list-item">待添加项目1</div>
                <div class="list-item">待添加项目2</div>
                <div class="list-item">待添加项目3</div>
                <!-- 你可以在这里继续添加更多项目 -->
            </div>
        </div>
    </div>

    <script>
        function toggleCard(header) {
            const content = header.nextElementSibling;
            content.classList.toggle('show');
            
            // 切换箭头方向
            if (content.classList.contains('show')) {
                header.textContent = header.textContent.replace('▼', '▲');
            } else {
                header.textContent = header.textContent.replace('▲', '▼');
            }
        }
    </script>
</body>
</html>
